anchor tag (<a>) is used to create hyperlinks in HTML. It allows users to click on a link and 
navigate to another webpage or a different section of the same webpage. 
The anchor tag is defined using the <a> element, and it typically includes 
an href attribute that specifies the URL of the destination page or section.
For example, <a href="https://www.flipkart.com">Visit Flipkart</a> creates
a hyperlink that directs users to the Flipkart website when clicked. 




Inline element and Block element are two types of HTML elements that differ in how they are displayed 
and how they affect the layout of a webpage.

Inline Element                                             | Block Element
------------------                                         | ------------------ 
- An inline element does not start on a new line and       | - A block element starts on a new line and takes up the full width available.
only takes up as much width as necessary.                  
- Examples of inline elements include <span>, <a>,         | - Examples of block elements include <div>, <p>, <h1> to <h6>, and <ul>.
<strong>, and <em>. 
- they take up only as much width as necessary and do not cause a line break.| they take up the full width available and cause a line break before and after the element.

attribute is a characteristic or property of an HTML element that provides additional information about the element or modifies its behavior.
Attributes are specified within the opening tag of an HTML element and consist of a name and a value
e.g. <a href="https://www.flipkart.com">Visit Flipkart</a> where href is the attribute name and "https://www.flipkart.com" is the attribute value.



class and id 

Class :- A class is a reusable identifier that can be assigned to multiple HTML elements.
It is defined using the class attribute and can be used to apply styles or target specific elements with JavaScript.
For example, <div class="container"> creates a div element with the class "container".

Id :- An id is a unique identifier that can be assigned to a single HTML element.
It is defined using the id attribute and is used to identify a specific element on the page.
For example, <h1 id="main-heading"> creates an h1 element with the id "main-heading".
