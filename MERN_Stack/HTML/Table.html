<body>
    <h1>Monthly Attendance System</h1>
    <table border="4" cellpadding="30" cellspacing="32" >
        <thead>
            <tr>
                <th rowspan="2">Department</th>
                <th rowspan="2">Name</th>
                <th colspan="5">January Attendance</th>
                <th colspan="2">Summary</th>
            </tr>
            <tr>
                <th>1st</th>
                <th>2nd</th>
                <th>3rd</th>
                <th>4th</th>
                <th>5th</th>
                <th>Total</th>
                <th>%</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="group-cell" rowspan="3">Science</td>
                <td>Aarryaa phtak</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="absent">A</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="total">4</td>
                <td class="total">80%</td>
            </tr>
            <tr>
                <td>niva</td>
                <td class="present">P</td>
                <td class="absent">A</td>
                <td class="present">P</td>
                <td class="absent">A</td>
                <td class="present">P</td>
                <td class="total">3</td>
                <td class="total">60%</td>
            </tr>
            <tr>
                <td>pataka</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="absent">A</td>
                <td class="total">4</td>
                <td class="total">80%</td>
            </tr>
            
            <tr>
                <td class="group-cell" rowspan="2">Arts</td>
                <td>chotabheem</td>
                <td class="absent">A</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="total">4</td>
                <td class="total">80%</td>
            </tr>
            <tr>
                <td>chutki</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="present">P</td>
                <td class="total">5</td>
                <td class="total">100%</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="2">Total Students</th>
                <th colspan="5"></th>
                <th>20</th>
                <th>80% Avg</th>
            </tr>
        </tfoot>
    </table>
</body>
